<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 المباريات - كأس العالم 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .matches-hero {
            text-align: center;
            padding: 120px 20px 40px;
            background: linear-gradient(135deg, #0a0f1e, #0a1a2f);
        }
        body.light .matches-hero {
            background: linear-gradient(135deg, #f5f7fa, #e8ecf1);
        }
        .matches-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem auto;
            max-width: 800px;
            padding: 0 1rem;
        }
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #00d2ff;
            color: #000;
            transform: scale(1.05);
        }
        body.light .filter-btn {
            background: rgba(0,0,0,0.1);
            color: #000;
        }
        body.light .filter-btn.active {
            background: #0066aa;
            color: white;
        }
        .matches-list {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem 4rem;
        }
        .match-day {
            margin-bottom: 2rem;
        }
        .day-title {
            font-size: 1.5rem;
            font-weight: bold;
            border-right: 4px solid #00d2ff;
            padding-right: 1rem;
            margin-bottom: 1rem;
        }
        .match-row {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            transition: 0.2s;
        }
        .match-row:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(-5px);
        }
        .match-teams {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .match-score {
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0,210,255,0.2);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .match-info {
            display: flex;
            gap: 1rem;
            align-items: center;
            color: #ccc;
            font-size: 0.9rem;
        }
        body.light .match-row {
            background: rgba(0,0,0,0.05);
        }
        body.light .match-info {
            color: #555;
        }
        @media (max-width: 700px) {
            .match-row { flex-direction: column; text-align: center; }
            .match-teams { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">🏆 كأس العالم 2026</div>
            <div class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="groups.html">المجموعات</a>
                <a href="teams.html">المنتخبات</a>
                <a href="matches.html" class="active">المباريات</a>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
    </nav>

    <div class="matches-hero">
        <h1>📅 جدول المباريات</h1>
        <p>جميع مباريات البطولة - تواريخ ونتائج</p>
    </div>

    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-group="all">الكل</button>
        <button class="filter-btn" data-group="A">المجموعة A</button>
        <button class="filter-btn" data-group="B">المجموعة B</button>
        <button class="filter-btn" data-group="C">المجموعة C</button>
        <button class="filter-btn" data-group="D">المجموعة D</button>
        <button class="filter-btn" data-group="E">المجموعة E</button>
        <button class="filter-btn" data-group="F">المجموعة F</button>
    </div>

    <div class="matches-list" id="matchesList"></div>

    <script>
        // بيانات المباريات الكاملة
        const allMatches = [
            { day: "الخميس 11 يونيو", team1: "🇺🇸 أمريكا", team2: "🇨🇦 كندا", score: "", time: "19:00", group: "A" },
            { day: "الخميس 11 يونيو", team1: "🇧🇷 البرازيل", team2: "🇦🇷 الأرجنتين", score: "2-2", time: "22:00", group: "A" },
            { day: "الجمعة 12 يونيو", team1: "🇫🇷 فرنسا", team2: "🇩🇪 ألمانيا", score: "1-0", time: "18:00", group: "B" },
            { day: "الجمعة 12 يونيو", team1: "🇲🇽 المكسيك", team2: "🇪🇸 إسبانيا", score: "", time: "21:00", group: "B" },
            { day: "السبت 13 يونيو", team1: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا", team2: "🇵🇹 البرتغال", score: "", time: "20:00", group: "C" },
            { day: "الأحد 14 يونيو", team1: "🇲🇦 المغرب", team2: "🇪🇬 مصر", score: "", time: "19:30", group: "D" },
            { day: "الإثنين 15 يونيو", team1: "🇮🇹 إيطاليا", team2: "🇧🇪 بلجيكا", score: "", time: "21:00", group: "F" }
        ];

        let currentGroup = "all";

        function renderMatches() {
            const container = document.getElementById("matchesList");
            if (!container) return;

            const filtered = currentGroup === "all" 
                ? allMatches 
                : allMatches.filter(m => m.group === currentGroup);

            // تجميع المباريات حسب اليوم
            const grouped = {};
            filtered.forEach(m => {
                if (!grouped[m.day]) grouped[m.day] = [];
                grouped[m.day].push(m);
            });

            let html = "";
            for (let day in grouped) {
                html += `<div class="match-day">
                            <div class="day-title">📆 ${day}</div>`;
                grouped[day].forEach(match => {
                    html += `<div class="match-row">
                                <div class="match-teams">
                                    <span>${match.team1}</span>
                                    <span>⚽</span>
                                    <span>${match.team2}</span>
                                </div>
                                <div class="match-score">${match.score || "VS"}</div>
                                <div class="match-info">
                                    <span>🕐 ${match.time}</span>
                                    <span>📌 المجموعة ${match.group}</span>
                                </div>
                            </div>`;
                });
                html += `</div>`;
            }
            container.innerHTML = html || "<p style='text-align:center'>لا توجد مباريات في هذه المجموعة</p>";
        }

        // أحداث الفلتر
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentGroup = btn.getAttribute("data-group");
                renderMatches();
            });
        });

        // تبديل الوضع الليلي
        const toggleBtn = document.getElementById("themeToggle");
        if (toggleBtn) {
            toggleBtn.addEventListener("click", () => {
                document.body.classList.toggle("light");
                toggleBtn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
            });
        }

        renderMatches();
    </script>
</body>
</html>
